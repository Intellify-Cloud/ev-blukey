<!-- Header -->
{% assign section = site.data.sitetext.header %}
<header class="hero" id="{{ section.section | default: 'hero' }}" aria-label="Hero Section">
    <div class="container">
      {%- if section.title -%}
      <h1 class="intro-heading">{{ section.title }}</h1>
      {%- endif -%}
  
      {%- if section.text -%}
      <p class="intro-lead-in">{{ section.text }}</p>
      {%- endif -%}
  
      {%- if section.cta -%}
      <a class="btn btn-xl js-scroll-trigger" href="{{ section.cta.url | default: '#services' }}">{{ section.cta.text | default: 'Get Started' }}</a>
      {%- endif -%}
      
      <!-- Optional scroll indicator -->
      <div class="scroll-indicator">
        <i class="fas fa-chevron-down" aria-hidden="true"></i>
      </div>
    </div>
</header>
<!-- End Header -->
